<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Productos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-card *ngFor="let p of products" (click)="goToDetail(p.id)">

    <img [src]="p.image" />

    <ion-card-header>
      <ion-card-title>{{ p.title }}</ion-card-title>
      <ion-card-subtitle>${{ p.price }}</ion-card-subtitle>
    </ion-card-header>

  </ion-card>

</ion-content>
