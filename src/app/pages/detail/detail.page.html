<ion-header>
  <ion-toolbar>
    <ion-title>Detalle</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content *ngIf="product">

  <img [src]="product.image" />

  <h2>{{ product.title }}</h2>

  <p>{{ product.description }}</p>

  <h3>${{ product.price }}</h3>

  <p><strong>Categoría:</strong> {{ product.category }}</p>

  <p>
    {{ product.rating.rate }}
    ({{ product.rating.count }} opiniones)
  </p>

</ion-content>
